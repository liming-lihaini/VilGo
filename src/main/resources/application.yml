server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: village-affairs-management
  main:
    allow-bean-definition-overriding: true
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:D:/village-data/village.db?date_string_format=yyyy-MM-dd%20HH:mm:ss
    hikari:
      maximum-pool-size: 1
      minimum-idle: 0
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  web:
    resources:
      static-locations: classpath:/static/,classpath:/templates/
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.village.entity

# 应用配置
app:
  attachment:
    path: D:/village-data/attachments

logging:
  level:
    com.village: debug
    org.springframework.web: info